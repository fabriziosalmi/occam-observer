name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends jq sqlite3 inotify-tools
          sudo apt-get install -y --no-install-recommends python3

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Smoke: engine syntax
        run: bash -n telemetry_observer.sh

      - name: Smoke: shipped config validates
        run: ./telemetry_observer.sh --validate

      - name: go vet + build (api)
        working-directory: api
        run: |
          go vet ./...
          go build -o /tmp/occam-api .

      - name: go vet + build (mcp)
        working-directory: mcp
        run: |
          go vet ./...
          go build -o /tmp/occam-mcp .

      - name: Run test suite
        run: ./run_tests.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t occam-observer:ci .
